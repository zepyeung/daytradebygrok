name: Pre-Market 固定每日開市前30分鐘推送

on:
  schedule:
    - cron: '30 13 * * 1-5'     # UTC 13:30 = 美東時間 9:30 AM（夏令時）→ 實際開市前30分鐘左右
  workflow_dispatch:            # 允許手動測試

jobs:
  premarket-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: 執行 Pre-Market 固定推送
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python premarket_fixed.py
