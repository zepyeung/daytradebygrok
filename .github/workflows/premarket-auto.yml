name: Pre-Market Daily Auto Push

on:
  schedule:
    - cron: '45 12 * * *'     # UTC 12:45 = 美東 8:45 AM（夏令時）
  workflow_dispatch:          # 允許你手動點擊測試

jobs:
  premarket-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Run Pre-Market Scanner + Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python premarket_auto.py
